name: rds-oidc-multitenant

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:

  cluster:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clusters/aws

    steps:
      - uses: actions/checkout@v3

      # 🔐 OIDC LOGIN (NO AWS KEYS)
      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::572309372498:role/rds-oidc-multitenant-platform
          aws-region: ap-south-1

      # 🏗 Terraform setup
      - uses: hashicorp/setup-terraform@v2

      - run: terraform init
      - run: terraform plan -var-file="vars/dev.tfvars"
      - run: terraform apply -auto-approve -var-file="vars/dev.tfvars"


  database:
    needs: [cluster]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: databases/aws

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::572309372498:role/rds-oidc-multitenant-platform
          aws-region: ap-south-1

      - uses: hashicorp/setup-terraform@v2

      - run: terraform init
      - run: terraform plan -var-file="vars/dev.tfvars"
      - run: terraform apply -auto-approve -var-file="vars/dev.tfvars"


  backup:
    needs: [database]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backup

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::572309372498:role/rds-oidc-multitenant-platform
          aws-region: ap-south-1

      - uses: hashicorp/setup-terraform@v2

      - run: terraform init
      - run: terraform plan -var-file="vars/dev.tfvars"
      - run: terraform apply -auto-approve -var-file="vars/dev.tfvars"
